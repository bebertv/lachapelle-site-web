<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version en construction — Église Saint-Pierre de Lachapelle</title>
    <meta http-equiv="refresh" content="3;url=../index.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #faf8f5;
            --color-bg-alt: #f0ebe3;
            --color-primary: #8b6914;
            --color-primary-dark: #6b4f0f;
            --color-accent: #c9a227;
            --color-text: #2c2416;
            --color-text-light: #5a4d3a;
            --color-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            padding: 3rem;
            background: var(--color-white);
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(44, 36, 22, 0.16);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: var(--color-primary-dark);
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        h1 span {
            display: block;
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--color-text-light);
            margin-bottom: 1rem;
        }

        .redirect-info {
            background: var(--color-bg-alt);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            font-size: 0.95rem;
        }

        .redirect-info a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .redirect-info a:hover {
            text-decoration: underline;
        }

        .home-link {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 1rem 2rem;
            background: var(--color-primary);
            color: var(--color-white);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .home-link:hover {
            background: var(--color-primary-dark);
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            h1 span {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>🚧</span>Version en construction</h1>
        <p>Cette version linguistique du site est temporairement indisponible. Nous travaillons à sa mise à jour.</p>
        <div class="redirect-info">
            <p>Vous allez être redirigé vers la version française dans <strong>3 secondes</strong>.</p>
            <p>Si la redirection ne fonctionne pas, <a href="../index.html">cliquez ici</a>.</p>
        </div>
        <a href="../index.html" class="home-link">Accéder à la version française</a>
    </div>
</body>
</html>
